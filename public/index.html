<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penny Stock Sniper 🎯</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h1>🎯 Penny Stock Sniper</h1>
        <div class="refresh-section">
            <button id="refresh-btn" class="refresh-btn">🔄 Refresh Data</button>
            <button id="cluster-filter-btn" class="refresh-btn"
                style="background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); margin-left: 10px;">🔥
                Cluster
                Filter</button>
            <button id="export-btn" class="refresh-btn"
                style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: #ffffff; border-color: rgba(255, 255, 255, 0.3); margin-left: 10px;">💾
                Export CSV</button>
            <span id="last-updated" class="last-updated"></span>
        </div>
        <div id="loading" class="loading">Loading data…</div>

        <!-- Hot Picks Section -->
        <div id="hot-picks" class="hidden">
            <h2 class="section-title">🔥 Hot Picks</h2>
            <div class="hot-picks-grid">
                <div class="hot-pick-card">
                    <h3>💰 Top 3 by Value</h3>
                    <table class="hot-picks-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Value</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="top-value-tbody"></tbody>
                    </table>
                </div>
                <div class="hot-pick-card">
                    <h3>⚡ 5 Most Recent</h3>
                    <table class="hot-picks-table">
                        <thead>
                            <tr>
                                <th>Ticker</th>
                                <th>Company</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recent-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Main Table -->
        <table id="data-table" class="hidden">
            <thead>
                <tr>
                    <th class="sortable" data-column="trade_date">Trade Date</th>
                    <th class="sortable" data-column="ticker">Ticker</th>
                    <th class="sortable" data-column="company">Company</th>
                    <th class="sortable" data-column="price">Price</th>
                    <th class="sortable" data-column="shares">Shares</th>

                    <th class="sortable" data-column="value">Value</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>

</html>
